<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dailymotion Player</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }

    .player-shell {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    .player-shell iframe {
      border: none;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: radial-gradient(circle at top left, #1f1f1f 0, #000 60%) fixed;
      z-index: 10;
    }

    .card {
      width: min(720px, 100%);
      background: rgba(18, 18, 18, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 25px 65px rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
    }

    .card h1 {
      font-size: 1.05rem;
      font-weight: 650;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    .hint {
      color: rgba(255, 255, 255, 0.75);
      font-size: 0.9rem;
      line-height: 1.35;
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1 1 320px;
      min-width: 220px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      outline: none;
      font-size: 0.95rem;
    }

    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.45);
    }

    input[type="text"]:focus {
      border-color: rgba(0, 188, 212, 0.9);
      box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.22);
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(0, 188, 212, 0.35);
      background: linear-gradient(135deg, rgba(0, 188, 212, 0.95), rgba(0, 163, 184, 0.95));
      color: #031214;
      font-weight: 650;
      cursor: pointer;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    button:active {
      transform: translateY(1px);
    }

    .error {
      min-height: 1.2em;
      margin-top: 10px;
      color: #ff6b6b;
      font-size: 0.9rem;
    }

    .muted-actions {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
    }

    .linkish {
      background: transparent;
      border: none;
      padding: 0;
      color: rgba(0, 188, 212, 0.9);
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="card">
      <h1>Paste a Dailymotion link (or video ID)</h1>
      <div class="hint">
        Examples: <code>https://www.dailymotion.com/video/x9sfi8i</code>,
        <code>https://geo.dailymotion.com/player.html?video=x9sfi8i</code>, or just <code>x9sfi8i</code>.
      </div>
      <div class="row">
        <input id="dm-input" type="text" placeholder="Dailymotion link or xID…" autocomplete="off" />
        <button id="play-btn" type="button">Play</button>
      </div>
      <div class="error" id="error"></div>
      <div class="muted-actions">
        <span>Tip: This works from <code>file://</code> (no server needed).</span>
        <button class="linkish" id="use-example" type="button">Use example</button>
      </div>
    </div>
  </div>

  <div class="player-shell">
    <iframe
      id="dm-iframe"
      src="about:blank"
      allowfullscreen
      allow="autoplay; fullscreen; picture-in-picture; web-share"
      title="Dailymotion Player"
    ></iframe>
  </div>

  <script>
    function extractDailymotionVideoId(input) {
      if (typeof input !== "string") return null;
      const raw = input.trim();
      if (!raw) return null;

      // Allow direct xID
      if (/^x[a-zA-Z0-9]+$/.test(raw)) return raw;

      // Try URL parsing
      try {
        const url = new URL(raw);

        // New endpoint style: geo.dailymotion.com/player.html?video=xID
        const qp = url.searchParams.get("video");
        if (qp && /^x[a-zA-Z0-9]+$/.test(qp)) return qp;

        // Path styles:
        // - /video/xID
        // - /embed/video/xID
        // - dai.ly/xID
        const path = url.pathname || "";

        const m1 = path.match(/\/video\/(x[a-zA-Z0-9]+)/i);
        if (m1 && m1[1]) return m1[1];

        const m2 = path.match(/\/embed\/video\/(x[a-zA-Z0-9]+)/i);
        if (m2 && m2[1]) return m2[1];

        const m3 = path.match(/\/(x[a-zA-Z0-9]+)$/i);
        if (m3 && m3[1]) return m3[1];
      } catch {
        // Not a URL — fall through to regex
      }

      // Last-chance regex: find /video/xID anywhere
      const any = raw.match(/(?:\/video\/|\/embed\/video\/)(x[a-zA-Z0-9]+)/i);
      if (any && any[1]) return any[1];

      return null;
    }

    function setVideo(videoId) {
      const iframe = document.getElementById("dm-iframe");
      const overlay = document.getElementById("overlay");
      if (!iframe || !overlay) return;

      document.title = "Dailymotion Player - " + videoId;
      iframe.src = "https://geo.dailymotion.com/player.html?video=" + encodeURIComponent(videoId);
      overlay.style.display = "none";
    }

    document.addEventListener("DOMContentLoaded", function () {
      const input = document.getElementById("dm-input");
      const playBtn = document.getElementById("play-btn");
      const error = document.getElementById("error");
      const useExample = document.getElementById("use-example");

      function tryPlay() {
        const id = extractDailymotionVideoId(input ? input.value : "");
        if (!id) {
          if (error) error.textContent = "Invalid link / ID. Please paste a Dailymotion video URL or an xID (e.g. x9sfi8i).";
          return;
        }
        if (error) error.textContent = "";
        setVideo(id);
      }

      if (playBtn) playBtn.addEventListener("click", tryPlay);

      if (useExample) {
        useExample.addEventListener("click", function () {
          if (input) input.value = "https://www.dailymotion.com/video/x9sfi8i";
          if (input) input.focus();
        });
      }

      if (input) {
        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            tryPlay();
          }
        });
        input.focus();
      }
    });
  </script>
</body>
</html>
